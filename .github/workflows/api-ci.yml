name: API Pipeline 
on:
  pull_request:
    branches: [main, qa, demo]
    paths: 
      - 'api/**'
      - '.github/workflows/api-ci.yml'

  push: 
    branches: [main, qa, demo]
    paths: 
      - 'api/**'
      - '.github/workflows/api-ci.yml'

jobs:
  lint-and-typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest 
    defaults:
      run: 
        working-directory: api

    steps: 
      - name: Checkout Code 
        uses: actions/checkout@v5 
      
      - name: Set up Python 
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy

      # 4. Run flake8 linting
      - name: Run flake8
        run: |
          # Fail if there are syntax/style issues
          flake8 . --count --max-complexity=10 --max-line-length=88 --statistics

      # 5. Run mypy type checking
      - name: Run mypy
        run: |
          # Fail if there are type errors
          mypy . --strict

  push-image:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/demo')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4 
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      
      - name: Login to Amazon ECR 
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f api/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG api
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
