name: Frontend Pipeline 
on:
  pull_request:
    branches: [main, qa, demo]
    paths: 
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

  push: 
    branches: [main, qa, demo]
    paths: 
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'


jobs: 
  lint-and-typecheck:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci 
      - run: npm run lint 
      - run: npm run type-check
  
  build:
    runs-on: ubuntu-latest
    defaults:
      run: 
        working-directory: frontend

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6 
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - run: npm ci 
      - run: npm run build 

      - name: Upload build output 
        uses: actions/upload-artifact@v4
        with:
          name: app-build 
          path: frontend/dist/
          retention-days: 1 

  push-image:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/demo')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Download build folder 
        uses: actions/download-artifact@v4
        with: 
          name: app-build 
          path: frontend/dist/

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4 
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      
      - name: Login to Amazon ECR 
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: my-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f frontend/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG


    
