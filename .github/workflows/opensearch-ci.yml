name: OpenSearch Pipeline 
on:
  pull_request:
    branches: [main, qa, demo]
    paths: 
      - 'opensearch/**'
      - '.github/workflows/opensearch-ci.yml'

  push: 
    branches: [main, qa, demo]
    paths: 
      - 'opensearch/**'
      - '.github/workflows/opensearch-ci.yml'

jobs:
  lint-json:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest 
    defaults:
      run:
        working-directory: opensearch

    steps: 
      - name: Checkout code 
        uses: actions/checkout@v4 
      
      - name: Install jsonlint
        run: npm install -g jsonlint

      - name: Lint JSON files
        run: |
          find . -name "*.json" -type f -exec jsonlint {} \; && echo "All JSON files are valid"


  push-image:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/qa' || github.ref == 'refs/heads/demo')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code 
        uses: actions/checkout@v4

      - name: Configure AWS credentials 
        uses: aws-actions/configure-aws-credentials@v4 
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-2
      
      - name: Login to Amazon ECR 
        id: login-ecr 
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: misp-workbench-opensearch
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f opensearch/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG opensearch
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

